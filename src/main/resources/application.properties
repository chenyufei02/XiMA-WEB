spring.application.name=XiMA-WEB

# ???????? Spring Boot ????? application-prod.properties?
spring.profiles.active=prod

# ===================================================================
# MYSQL DATABASE CONFIGURATION (?????)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ximalu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
# ???????????? application-prod.properties ?
spring.datasource.password=your_mysql_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# MYBATIS-PLUS CONFIGURATION
# ===================================================================
mybatis-plus.mapper-locations=classpath:/mapper/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

# ===================================================================
# DJI FLIGHTHUB 2 API CONFIGURATION
# ===================================================================
dji.api.base-url=https://es-flight-api-cn.djigate.com
# ???????????? application-prod.properties ?
dji.api.organization-key=your_dji_org_key_here

dji.api.project-uuid=
dji.api.access-token=

# ===================================================================
# ???? SMTP
# ===================================================================
spring.mail.host=smtp.163.com
spring.mail.port=465
# ?????????????????? application-prod.properties ?
spring.mail.username=your_email_address_here@163.com
spring.mail.password=your_email_auth_code_here

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# ==========================================
# AI Configuration (Moonshot / Kimi)
# ==========================================
ai.kimi.api-url=https://api.moonshot.cn/v1/chat/completions
ai.kimi.model=moonshot-v1-8k
# ?????? Kimi Key ???? application-prod.properties ?
ai.kimi.api-key=your_kimi_api_key_here

# ==========================================
# ??? OBS ??
# ==========================================
xima.obs.default-endpoint=obs.cn-east-3.myhuaweicloud.com
xima.obs.default-bucket=xima-photos-whu
# ?????? AK/SK ???? application-prod.properties ?
xima.obs.default-ak=your_huawei_ak_here
xima.obs.default-sk=your_huawei_sk_here